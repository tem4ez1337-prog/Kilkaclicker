<!DOCTYPE html>
<html>
<head>
    <title>Clicker Game</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            display: flex;
        }

        .left {
            width: 220px;
            background: #1a1a1a;
            padding: 10px;
            height: 100vh;
        }

        .center {
            flex: 1;
            text-align: center;
            padding-top: 30px;
        }

        img {
            width: 300px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
        }

        img:active {
            transform: scale(0.95);
        }

        button {
            display: block;
            margin: 8px auto;
            padding: 10px;
            width: 200px;
            cursor: pointer;
        }

        input {
            padding: 8px;
            width: 180px;
        }
    </style>
</head>
<body>

<!-- LEADERBOARD -->
<div class="left">
    <h2>🏆 Leaderboard</h2>
    <ol id="board"></ol>
</div>

<!-- GAME -->
<div class="center">

<h1>Клики: <span id="count">0</span></h1>

<input id="name" placeholder="Твой ник">
<br>
<button onclick="confirmName()">Confirm</button>

<br><br>

<img id="photo"
src="https://cdn.discordapp.com/attachments/1419778498540601525/1510988303674118184/photo_2026-05-30_18-52-54.jpg?ex=6a1ed104&is=6a1d7f84&hm=0a0d1aca972bac23879633d307e068015dbc9a6e9f63b610cd6a756b3d1e0f1b&">

<h2>🛒 Магазин</h2>

<p>Сила: <span id="power">1</span></p>

<button onclick="buy(1,50)">+1 (50)</button>
<button onclick="buy(2,150)">+2 (150)</button>
<button onclick="buy(5,400)">+5 (400)</button>

</div>

<script>
let clicks = 0;
let power = 1;

let name = "";
let confirmed = false;

let players = {};

// клик
document.getElementById("photo").onclick = function () {
    if (!confirmed) {
        alert("Сначала нажми Confirm!");
        return;
    }

    clicks += power;
    update();
};

// confirm
function confirmName() {
    let input = document.getElementById("name").value.trim();

    if (!input) {
        alert("Введи ник!");
        return;
    }

    name = input;
    confirmed = true;

    alert("Ник подтверждён: " + name);
}

// магазин
function buy(add, cost) {
    if (!confirmed) {
        alert("Сначала Confirm!");
        return;
    }

    if (clicks >= cost) {
        clicks -= cost;
        power += add;
        update();
    } else {
        alert("Не хватает кликов!");
    }
}

// обновление
function update() {
    document.getElementById("count").innerText = clicks;
    document.getElementById("power").innerText = power;

    if (confirmed) {
        players[name] = clicks;
        updateBoard();
    }
}

// лидерборд
function updateBoard() {
    let board = document.getElementById("board");
    board.innerHTML = "";

    let sorted = Object.entries(players)
        .sort((a,b)=>b[1]-a[1]);

    for (let p of sorted) {
        let li = document.createElement("li");
        li.innerText = p[0] + " - " + p[1];
        board.appendChild(li);
    }
}
</script>

</body>
</html
