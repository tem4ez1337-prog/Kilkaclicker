<!DOCTYPE html>
<html>
<head>
    <title>Кликер</title>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
            display: flex;
        }

        /* ЛЕВЫЙ ЛИДЕРБОРД */
        .left {
            width: 200px;
            background: #1a1a1a;
            padding: 10px;
            height: 100vh;
        }

        /* ЦЕНТР */
        .center {
            flex: 1;
            text-align: center;
            padding-top: 30px;
        }

        img {
            width: 300px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
        }

        img:active {
            transform: scale(0.95);
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            border: none;
            width: 200px;
        }
    </style>
</head>
<body>

<!-- ЛИДЕРБОРД -->
<div class="left">
    <h2>🏆 Лидерборд</h2>
    <p>Ты: <span id="score">0</span></p>
</div>

<!-- ЦЕНТР -->
<div class="center">

    <h1>Клики: <span id="count">0</span></h1>

    <img id="photo"
    src="https://cdn.discordapp.com/attachments/1419778498540601525/1510988303674118184/photo_2026-05-30_18-52-54.jpg?ex=6a1ed104&is=6a1d7f84&hm=0a0d1aca972bac23879633d307e068015dbc9a6e9f63b610cd6a756b3d1e0f1b&">

    <h2>🛒 Магазин</h2>

    <p>Сила клика: <span id="power">1</span></p>

    <button onclick="buy1()">+1 клик (Цена: <span id="c1">100</span>)</button>
    <button onclick="buy2()">+2 клика (Цена: <span id="c2">200</span>)</button>
    <button onclick="buy5()">+5 кликов (Цена: <span id="c5">500</span>)</button>

</div>

<script>
let clicks = 0;
let power = 1;

// цены
let c1 = 100;
let c2 = 200;
let c5 = 500;

document.getElementById("photo").onclick = function () {
    clicks += power;
    update();
};

function buy1() {
    if (clicks >= c1) {
        clicks -= c1;
        power += 1;
        c1 = Math.floor(c1 * 2.5);
        update();
    }
}

function buy2() {
    if (clicks >= c2) {
        clicks -= c2;
        power += 2;
        c2 = Math.floor(c2 * 2.5);
        update();
    }
}

function buy5() {
    if (clicks >= c5) {
        clicks -= c5;
        power += 5;
        c5 = Math.floor(c5 * 2.5);
        update();
    }
}

function update() {
    document.getElementById("count").textContent = clicks;
    document.getElementById("score").textContent = clicks;
    document.getElementById("power").textContent = power;

    document.getElementById("c1").textContent = c1;
    document.getElementById("c2").textContent = c2;
    document.getElementById("c5").textContent = c5;
}
</script>

</body>
</html>
